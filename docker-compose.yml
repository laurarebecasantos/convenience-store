version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_SECRET:-root1234}
      MYSQL_DATABASE: conveniencestore_db
    ports:
      - "3307:3306"  # 🔥 evita conflito com outro MySQL
    volumes:
      - mysql_convenience_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysql -uroot -p${DB_SECRET:-root1234} -e 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://mysql:3306/conveniencestore_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_SECRET: ${DB_SECRET:-root1234}
      JWT_SECRET: ${JWT_SECRET:-123456789}
    ports:
      - "8081:8080"  # 🔥 evita conflito com outro app
    restart: unless-stopped

volumes:
  mysql_convenience_data: