spring.application.name=convenience-store
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/conveniencestore_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_SECRET:root1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
server.error.include-stacktrace=never
flyway.ignoreMigrationPatterns=*:ignored
api.security.token.secret=${JWT_SECRET:123456789}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized